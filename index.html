<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVE - Prodejní nástroj</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AVE Sales Tool</h2>
    </div>

    <div class="input-group">
        <label>Klient (ARES vyhledávání)</label>
        <input type="text" id="zakaznik" placeholder="Název firmy nebo IČO..." autocomplete="off">
        <div id="ares-results"></div>
    </div>

    <div class="input-group">
        <label>Adresa realizace</label>
        <input type="text" id="sidlo" placeholder="Ulice, č.p., obec...">
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;" class="contact-row">
        <div style="flex:1"><label>Telefon</label><input type="tel" id="telefon" placeholder="777 000 000"></div>
        <div style="flex:1"><label>Email</label><input type="email" id="email_klienta" placeholder="info@klient.cz"></div>
    </div>

    <div class="preview-area">
        <div id="icon" class="bin-container">
            <svg class="ave-logo-svg" viewBox="0 0 100 40">
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-style="italic">AVE</text>
            </svg>
            <div id="inner-text">ČERNÁ<br>120 L</div>
        </div>
        
        <div class="grid waste-grid">
            <label><input type="radio" name="Odpad" value="#1a1a1a" data-txt="Černá" checked onclick="updateUI()"><div class="box">KOMUNÁL</div></label>
            <label><input type="radio" name="Odpad" value="#0d47a1" data-txt="Modrá" onclick="updateUI()"><div class="box" style="color:#64b5f6">PAPÍR</div></label>
            <label><input type="radio" name="Odpad" value="#fbc02d" data-txt="Žlutá" onclick="updateUI()"><div class="box" style="color:#fff176">PLAST</div></label>
            <label><input type="radio" name="Odpad" value="#3e2723" data-txt="Hnědá" onclick="updateUI()"><div class="box" style="color:#a1887f">BIO</div></label>
        </div>

        <div class="grid size-grid">
            <label><input type="radio" name="Objem" value="120 L" checked onclick="updateUI()"><div class="box">120 L</div></label>
            <label><input type="radio" name="Objem" value="240 L" onclick="updateUI()"><div class="box">240 L</div></label>
            <label><input type="radio" name="Objem" value="1100 L" onclick="updateUI()"><div class="box">1100 L</div></label>
        </div>

        <div class="qty-area">
            <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
            <b id="qty-val" style="font-size:1.8rem">1</b>
            <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button type="button" class="add-btn" onclick="addToCart()">Přidat do nabídky</button>
    </div>

    <div id="cart-area" class="cart-area">
        <div id="cart-items"></div>
    </div>

    <form action="https://formsubmit.co/martinpiloprace@gmail.com" method="POST" onsubmit="return prepare()">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="OBCHODNÍK_ZPRÁVA" value="Nová poptávka z mobilního nástroje AVE">
        
        <input type="hidden" name="FIRMA" id="f-z">
        <input type="hidden" name="MÍSTO" id="f-s">
        <input type="hidden" name="KONTAKT" id="f-k">
        <input type="hidden" name="POLOŽKY" id="f-o">
        
        <button type="submit" class="submit-btn">Vytvořit poptávku</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
